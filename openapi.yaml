openapi: 3.0.3

info:
  title: Notes API
  description: 
    A RESTful CRUD API for managing notes.

    Built for Day 1 of the IEEE x GitHub Campus Experts Codeathon — Backend Track.
    Focus: HTTP fundamentals, clean REST design, semantic status codes,
    and defensive engineering.
  version: 1.0.0

servers:
  - url: http://localhost:3500
    description: Local development server

tags:
  - name: notes
    description: Note CRUD operations

paths:
  /notes:
    get:
      tags: [notes]
      summary: List notes
      description: |
        Returns a paginated list of notes. Optionally sorted by title,
        creation date, or last update. Empty result sets return `200 OK`
        with an empty array.
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: sort
          in: query
          required: false
          description: |
            Optional sort order:
              * `title`        — alphabetical, descending (Z → A)
              * `newest`       — most recently created first
              * `lastupdated`  — most recently updated first
          schema:
            type: string
            enum: [title, newest, lastupdated]
      responses:
        "200":
          description: Array of notes for the requested page
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
        "400":
          description: Invalid `sort` value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [notes]
      summary: Create a new note
      description: |
        Creates a note. The server generates `id`, `createdAt`,
        and `updatedAt`. `POST` is **not** idempotent — two identical
        POSTs create two notes with different ids.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /notes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier of the note
        schema:
          type: string
          format: uuid

    get:
      tags: [notes]
      summary: Get a single note by id
      responses:
        "200":
          description: The requested note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [notes]
      summary: Replace a note (full update)
      description: |
        **Idempotent.** Calling N times with the same payload produces
        the same result as calling once. The original `createdAt` is
        preserved; `updatedAt` is refreshed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Note replaced successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

    patch:
      tags: [notes]
      summary: Update a note (partial)
      description: |
        Only fields present in the request body are modified. Omitted
        fields are left untouched.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotePatch"
      responses:
        "200":
          description: Note updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

    delete:
      tags: [notes]
      summary: Delete a note
      description: |
        **Idempotent.** Successful deletion returns `204 No Content`
        with no body.
      responses:
        "204":
          description: Note deleted (no content)
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Note:
      type: object
      description: A note resource as returned by the server.
      required: [id, title, body, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: 8f3a1b2c-4d5e-6f70-8a9b-0c1d2e3f4a5b
        title:
          type: string
          example: Buy groceries
        body:
          type: string
          example: Milk, eggs, bread, and dark chocolate.
        createdAt:
          type: string
          format: date-time
          example: 2026-05-20T09:14:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-05-20T09:14:00.000Z

    NoteInput:
      type: object
      description: Request body for POST and PUT — both fields required.
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Buy groceries
        body:
          type: string
          minLength: 1
          example: Milk, eggs, bread, and dark chocolate.

    NotePatch:
      type: object
      description: |
        Request body for PATCH — partial update. At least one field
        must be provided.
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Note not found"

    ValidationError:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
          example: "Validation failed"
        details:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
                example: title
              message:
                type: string
                example: "title must be a non-empty string"
